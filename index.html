<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <title>CarPlay Box</title>
  
  <script src="./lucide.min.js"></script>

  <style>
    /* Reset & Variáveis */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
    :root { --primary: #1DB954; --bg-dark: #000; --bg-panel: #121212; --bg-hover: #1f1f1f; --text-main: #fff; --text-muted: #a1a1aa; }
    body, html { width: 100%; height: 100%; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }

    /* Utilitários */
    .hidden { display: none !important; }
    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .flex-col { flex-direction: column; }
    
    /* Layout Base */
    #app-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
    
    /* Player Global (Fundo) */
    #global-video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: contain; background: black; pointer-events: none;
      opacity: 0; z-index: 0; transition: opacity 0.5s;
    }
    #global-video.show { opacity: 1; z-index: 0; }

    /* Tela 1: Lista */
    #view-list { flex: 1; display: flex; gap: 8px; padding: 8px; z-index: 10; background: var(--bg-dark); height: 100%; }
    
    .sidebar { width: 250px; background: var(--bg-panel); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 24px; }
    .logo-container { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 20px; }
    .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; }
    .menu-btn { display: flex; align-items: center; gap: 12px; color: var(--text-muted); background: none; border: none; font-size: 16px; cursor: pointer; padding: 12px 8px; border-radius: 6px; width: 100%; text-align: left; transition: 0.2s; }
    .menu-btn:hover { background: var(--bg-hover); color: var(--text-main); }
    .menu-btn.active { color: var(--text-main); font-weight: bold; }

    .main-content { flex: 1; background: linear-gradient(180deg, #2a2a2a 0%, var(--bg-panel) 100%); border-radius: 8px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .header { padding: 24px; font-size: 28px; font-weight: bold; }
    .list-container { flex: 1; overflow-y: auto; padding: 0 24px 100px 24px; }
    
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); gap: 16px; opacity: 0.5; }
    
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { color: var(--text-muted); border-bottom: 1px solid #333; padding-bottom: 12px; font-weight: normal; font-size: 14px; }
    tr.media-row { cursor: pointer; transition: 0.2s; border-radius: 6px; }
    tr.media-row:hover { background: rgba(255,255,255,0.1); }
    tr.media-row.playing { background: rgba(255,255,255,0.05); }
    td { padding: 12px 0; border-radius: 6px; }
    td:first-child { border-top-left-radius: 6px; border-bottom-left-radius: 6px; text-align: center; width: 40px; color: var(--text-muted); }
    td:last-child { border-top-right-radius: 6px; border-bottom-right-radius: 6px; text-align: right; padding-right: 16px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
    
    .media-info { display: flex; align-items: center; gap: 12px; }
    .media-cover { width: 40px; height: 40px; border-radius: 4px; background: #333; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; flex-shrink: 0; }
    .media-title { font-weight: 500; font-size: 16px; color: var(--text-main); }
    tr.media-row.playing .media-title { color: var(--primary); }

    /* Mini Player Flutuante */
    .mini-player { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: #0a0a0a; border-top: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; cursor: pointer; transition: 0.2s; }
    .mini-player:hover { background: #1a1a1a; }
    .controls { display: flex; align-items: center; gap: 16px; }
    .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .btn-icon:hover { color: var(--text-main); transform: scale(1.1); }
    .play-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--text-main); color: black; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .play-btn:hover { transform: scale(1.05); }

    /* Tela 2: Audio Fullscreen */
    #view-audio { position: absolute; inset: 0; background: #0a0a0a; z-index: 20; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
    .back-btn { position: absolute; top: 24px; left: 24px; color: rgba(255,255,255,0.8); background: none; border: none; cursor: pointer; transition: 0.2s; }
    .back-btn:hover { color: white; transform: translateY(-4px); }
    
    .audio-center { display: flex; align-items: center; gap: 48px; max-width: 1000px; margin: 0 auto 40px auto; width: 100%; }
    .big-cover { width: 320px; height: 320px; border-radius: 32px; background: #222; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; flex-shrink: 0; }
    .audio-texts { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .audio-texts h1 { font-size: 64px; line-height: 1.1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .audio-texts h2 { font-size: 24px; color: rgba(255,255,255,0.7); font-weight: normal; }

    /* Tela 3: Video Fullscreen */
    #view-video { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
    #view-video .back-btn { pointer-events: auto; }
    .video-bottom-bar { width: 100%; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 60%, transparent 100%); padding: 60px 32px 32px 32px; display: flex; align-items: flex-end; justify-content: space-between; pointer-events: auto; }
    .video-info { display: flex; align-items: center; gap: 24px; }
    .video-thumb { width: 96px; height: 96px; background: white; border-radius: 16px; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; flex-shrink: 0; }
    
    /* Controles Comuns (Barra de Progresso) */
    .player-controls { max-width: 1000px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 24px; }
    .video-bottom-bar .player-controls { max-width: 500px; margin: 0; }
    
    .progress-wrapper { display: flex; align-items: center; gap: 16px; width: 100%; }
    .time-text { font-size: 14px; color: rgba(255,255,255,0.6); width: 45px; text-align: center; }
    input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: #333; border-radius: 4px; outline: none; cursor: pointer; accent-color: var(--primary); }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--primary); cursor: pointer; }
    
    .main-buttons { display: flex; align-items: center; justify-content: center; gap: 32px; }
    .main-buttons .play-btn { width: 64px; height: 64px; }
    .main-buttons .play-btn i { width: 28px; height: 28px; }

    /* Responsividade Celular */
    @media (max-width: 768px) {
      .sidebar { display: none; } /* Esconde sidebar no celular */
      .audio-center { flex-direction: column; text-align: center; margin-top: 40px; }
      .big-cover { width: 250px; height: 250px; }
      .audio-texts h1 { font-size: 32px; }
      .video-bottom-bar { flex-direction: column; align-items: flex-start; gap: 20px; }
      .video-bottom-bar .player-controls { max-width: 1000px; }
    }
  </style>
</head>
<body>

  <div id="app-container">
    
    <video id="global-video" playsinline></video>

    <input type="file" id="folder-input" multiple webkitdirectory directory accept="audio/*,video/*" class="hidden">
    <input type="file" id="file-input" multiple accept="audio/*,video/*" class="hidden">

    <div id="view-list">
      <div class="sidebar">
        <div class="logo-container">
          <div class="logo-icon"><i data-lucide="play" fill="black" style="width:16px; height:16px; margin-left:3px;"></i></div>
          CarPlay Box
        </div>
        <div class="flex-col" style="gap: 12px;">
          <button class="menu-btn active"><i data-lucide="library"></i> Arquivos Locais</button>
        </div>
        <div class="flex-col" style="gap: 8px; margin-top: auto;">
          <button class="menu-btn" onclick="document.getElementById('folder-input').click()">
            <i data-lucide="folder-plus"></i> <span class="truncate">Buscar Pasta</span>
          </button>
          <button class="menu-btn" onclick="document.getElementById('file-input').click()">
            <i data-lucide="file-plus"></i> <span class="truncate">Buscar Arquivos</span>
          </button>
        </div>
      </div>

      <div class="main-content">
        <div class="header">Mídias Carregadas</div>
        <div class="list-container">
          <div id="empty-state" class="empty-state">
            <i data-lucide="music" style="width: 64px; height: 64px;"></i>
            <p>Selecione arquivos para começar a tocar.</p>
          </div>
          <table id="media-table" class="hidden">
            <thead>
              <tr>
                <th>#</th>
                <th>Título</th>
                <th>Tipo</th>
              </tr>
            </thead>
            <tbody id="media-list-body">
              </tbody>
          </table>
        </div>

        <div id="mini-player" class="mini-player hidden" onclick="openPlayerView()">
          <div class="flex items-center gap-4">
            <div id="mini-cover" class="media-cover"></div>
            <div class="flex-col">
              <span id="mini-title" style="font-weight: 600;">-</span>
              <span style="font-size: 12px; color: var(--text-muted);">Clique para expandir</span>
            </div>
          </div>
          <div class="controls" onclick="event.stopPropagation()">
            <button class="btn-icon" onclick="prevTrack()"><i data-lucide="skip-back" fill="currentColor"></i></button>
            <button class="play-btn" onclick="togglePlay()"><i id="mini-play-icon" data-lucide="play" fill="currentColor"></i></button>
            <button class="btn-icon" onclick="nextTrack()"><i data-lucide="skip-forward" fill="currentColor"></i></button>
          </div>
        </div>
      </div>
    </div>

    <div id="view-audio" class="hidden">
      <button class="back-btn" onclick="showListView()"><i data-lucide="chevron-down" style="width:40px; height:40px;"></i></button>
      
      <div class="audio-center">
        <div id="audio-big-cover" class="big-cover"></div>
        <div class="audio-texts">
          <span style="color: rgba(255,255,255,0.7); font-size: 20px;">Nome do Álbum</span>
          <h1 id="audio-title">Título da Música</h1>
          <h2>Artista...</h2>
        </div>
      </div>

      <div class="player-controls">
        <div class="progress-wrapper">
          <span id="audio-current-time" class="time-text">0:00</span>
          <input type="range" id="audio-seek" min="0" max="100" value="0">
          <span id="audio-duration" class="time-text">0:00</span>
        </div>
        <div class="main-buttons">
          <button id="btn-shuffle" class="btn-icon" onclick="toggleShuffle()"><i data-lucide="shuffle"></i></button>
          <button class="btn-icon" onclick="prevTrack()"><i data-lucide="skip-back" fill="currentColor" style="width:32px; height:32px;"></i></button>
          <button class="play-btn" onclick="togglePlay()"><i id="audio-play-icon" data-lucide="play" fill="currentColor"></i></button>
          <button class="btn-icon" onclick="nextTrack()"><i data-lucide="skip-forward" fill="currentColor" style="width:32px; height:32px;"></i></button>
          <button class="btn-icon"><i data-lucide="repeat"></i></button>
        </div>
      </div>
    </div>

    <div id="view-video" class="hidden">
      <div style="padding: 24px;">
        <button class="back-btn" onclick="showListView()"><i data-lucide="chevron-down" style="width:40px; height:40px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));"></i></button>
      </div>

      <div class="video-bottom-bar">
        <div class="video-info">
          <div id="video-thumb" class="video-thumb"></div>
          <div class="flex-col">
            <h1 id="video-title" style="font-size: 28px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Título do Vídeo</h1>
            <h2 style="font-size: 18px; color: rgba(255,255,255,0.8); text-shadow: 0 1px 2px rgba(0,0,0,0.8);">Artista...</h2>
          </div>
        </div>

        <div class="player-controls">
          <div class="progress-wrapper">
            <span id="video-current-time" class="time-text" style="text-shadow: 0 1px 2px black;">0:00</span>
            <input type="range" id="video-seek" min="0" max="100" value="0">
            <span id="video-duration" class="time-text" style="text-shadow: 0 1px 2px black;">0:00</span>
          </div>
          <div class="main-buttons">
            <button id="btn-shuffle-vid" class="btn-icon" onclick="toggleShuffle()"><i data-lucide="shuffle"></i></button>
            <button class="btn-icon" onclick="prevTrack()"><i data-lucide="skip-back" fill="currentColor" style="width:24px; height:24px;"></i></button>
            <button class="play-btn" style="width:56px; height:56px;" onclick="togglePlay()"><i id="video-play-icon" data-lucide="play" fill="currentColor" style="width:24px; height:24px;"></i></button>
            <button class="btn-icon" onclick="nextTrack()"><i data-lucide="skip-forward" fill="currentColor" style="width:24px; height:24px;"></i></button>
            <button class="btn-icon"><i data-lucide="repeat"></i></button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Inicializa os ícones Lucide
    lucide.createIcons();

    // ================= REGISTRO DO SERVICE WORKER (PWA) =================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.log('SW falhou: ', err);
        });
      });
    }

    // ================= ESTADO DO APP =================
    let mediaList = [];
    let currentIndex = -1;
    let isPlaying = false;
    let isShuffle = false;
    let viewMode = 'list'; // list, audio, video

    // Referências DOM
    const videoEl = document.getElementById('global-video');
    const listBody = document.getElementById('media-list-body');
    const emptyState = document.getElementById('empty-state');
    const mediaTable = document.getElementById('media-table');
    const miniPlayer = document.getElementById('mini-player');
    
    // ================= UTILITÁRIOS =================
    const formatTime = (time) => {
      if (isNaN(time)) return "0:00";
      const mins = Math.floor(time / 60);
      const secs = Math.floor(time % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    };

    const getGradient = (name) => {
      if (!name) return 'linear-gradient(135deg, #333, #111)';
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      const hue1 = Math.abs(hash % 360);
      const hue2 = (hue1 + 60) % 360;
      return `linear-gradient(135deg, hsl(${hue1}, 60%, 30%), hsl(${hue2}, 70%, 15%))`;
    };

    // Atualiza ícones quando Reactivity mudar
    const updateIcons = () => {
      lucide.createIcons();
    }

    // ================= PROCESSAMENTO DE ARQUIVOS =================
    const extractVideoThumbnail = (file) => {
      return new Promise((resolve) => {
        const video = document.createElement('video');
        video.preload = 'metadata';
        video.src = URL.createObjectURL(file);
        video.muted = true;
        video.playsInline = true;

        video.onloadedmetadata = () => {
          video.currentTime = Math.min(2, video.duration / 2 || 0);
        };

        video.onseeked = () => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 320;
            canvas.height = video.videoHeight || 180;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          } catch (e) { resolve(null); }
          URL.revokeObjectURL(video.src);
        };
        video.onerror = () => { resolve(null); URL.revokeObjectURL(video.src); };
      });
    };

    const extractAudioCover = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const buffer = e.target.result;
            const view = new DataView(buffer);
            if (view.byteLength < 10 || view.getUint8(0) !== 0x49 || view.getUint8(1) !== 0x44 || view.getUint8(2) !== 0x33) return resolve(null);
            const version = view.getUint8(3);
            let offset = 10;
            let size = (view.getUint8(6) << 21) | (view.getUint8(7) << 14) | (view.getUint8(8) << 7) | view.getUint8(9);
            
            while (offset < size + 10 && offset < view.byteLength) {
              let frameId = String.fromCharCode(view.getUint8(offset), view.getUint8(offset+1), view.getUint8(offset+2), view.getUint8(offset+3));
              let frameSize = 0;
              if (version === 3) frameSize = view.getUint32(offset + 4);
              else if (version === 4) frameSize = (view.getUint8(offset+4) << 21) | (view.getUint8(offset+5) << 14) | (view.getUint8(offset+6) << 7) | view.getUint8(offset+7);
              else break; 
              if (frameSize === 0) break;
              if (frameId === 'APIC') {
                const frameData = new Uint8Array(buffer, offset + 10, frameSize);
                let imageStart = -1, mime = 'image/jpeg';
                for (let i = 0; i < frameData.length - 3; i++) {
                  if (frameData[i] === 0xFF && frameData[i+1] === 0xD8 && frameData[i+2] === 0xFF) { imageStart = i; mime = 'image/jpeg'; break; }
                  if (frameData[i] === 0x89 && frameData[i+1] === 0x50 && frameData[i+2] === 0x4E && frameData[i+3] === 0x47) { imageStart = i; mime = 'image/png'; break; }
                }
                if (imageStart !== -1) {
                  const blob = new Blob([frameData.slice(imageStart)], { type: mime });
                  return resolve(URL.createObjectURL(blob));
                }
              }
              offset += 10 + frameSize;
            }
            resolve(null);
          } catch (err) { resolve(null); }
        };
        reader.onerror = () => resolve(null);
        reader.readAsArrayBuffer(file.slice(0, 5 * 1024 * 1024));
      });
    };

    const handleFileUpload = (e) => {
      const files = Array.from(e.target.files).filter(f => 
        f.type.startsWith('audio/') || f.type.startsWith('video/') || f.name.endsWith('.mp3') || f.name.endsWith('.mp4')
      );
      if (files.length === 0) return;

      const newMedia = files.map(f => ({
        id: crypto.randomUUID(),
        name: f.name.replace(/\.[^/.]+$/, ""),
        type: (f.type.startsWith('video/') || f.name.endsWith('.mp4')) ? 'video' : 'audio',
        url: URL.createObjectURL(f),
        file: f,
        cover: null
      }));

      const startIdx = mediaList.length;
      mediaList = [...mediaList, ...newMedia];
      
      if (currentIndex === -1 && newMedia.length > 0) {
        currentIndex = 0;
      }
      
      renderList();

      newMedia.forEach(async (media, idx) => {
        const coverUrl = media.type === 'video' ? await extractVideoThumbnail(media.file) : await extractAudioCover(media.file);
        if (coverUrl) {
          mediaList[startIdx + idx].cover = coverUrl;
          renderList();
          updatePlayerUI();
        }
      });
    };

    document.getElementById('file-input').addEventListener('change', handleFileUpload);
    document.getElementById('folder-input').addEventListener('change', handleFileUpload);

    // ================= RENDERIZAÇÃO DA LISTA =================
    const renderList = () => {
      if (mediaList.length === 0) {
        emptyState.classList.remove('hidden');
        mediaTable.classList.add('hidden');
        return;
      }
      emptyState.classList.add('hidden');
      mediaTable.classList.remove('hidden');
      
      listBody.innerHTML = mediaList.map((media, index) => {
        const isPlayingThis = index === currentIndex;
        const defaultStyle = media.cover ? `background-image: url(${media.cover})` : (media.type === 'audio' ? `background: ${getGradient(media.name)}` : '');
        const iconHtml = !media.cover ? (media.type === 'video' ? `<i data-lucide="monitor-play" class="text-muted"></i>` : `<i data-lucide="music" style="opacity:0.5"></i>`) : '';
        const indexHtml = isPlayingThis ? `<i data-lucide="play" fill="#1DB954" style="color:#1DB954; width:16px;"></i>` : index + 1;
        
        return `
          <tr class="media-row ${isPlayingThis ? 'playing' : ''}" onclick="playMedia(${index})">
            <td>${indexHtml}</td>
            <td>
              <div class="media-info">
                <div class="media-cover" style="${defaultStyle}">${iconHtml}</div>
                <span class="media-title truncate">${media.name}</span>
              </div>
            </td>
            <td>${media.type}</td>
          </tr>
        `;
      }).join('');
      
      updateIcons();
    };

    // ================= LÓGICA DO PLAYER =================
    const playMedia = (index) => {
      currentIndex = index;
      const media = mediaList[currentIndex];
      
      videoEl.src = media.url;
      videoEl.play().then(() => {
        isPlaying = true;
        openPlayerView();
        renderList();
      }).catch(e => console.error("Autoplay prevent", e));
    };

    const togglePlay = () => {
      if (!mediaList[currentIndex]) return;
      if (isPlaying) {
        videoEl.pause();
      } else {
        videoEl.play();
      }
      isPlaying = !isPlaying;
      updatePlayPauseIcons();
    };

    const nextTrack = () => {
      if (mediaList.length === 0) return;
      if (isShuffle) {
        currentIndex = Math.floor(Math.random() * mediaList.length);
      } else {
        currentIndex = (currentIndex + 1) % mediaList.length;
      }
      playMedia(currentIndex);
    };

    const prevTrack = () => {
      if (mediaList.length === 0) return;
      currentIndex = currentIndex === 0 ? mediaList.length - 1 : currentIndex - 1;
      playMedia(currentIndex);
    };

    const toggleShuffle = () => {
      isShuffle = !isShuffle;
      document.getElementById('btn-shuffle').style.color = isShuffle ? 'var(--primary)' : 'var(--text-muted)';
      document.getElementById('btn-shuffle-vid').style.color = isShuffle ? 'var(--primary)' : 'var(--text-muted)';
    };

    // Eventos do Vídeo
    videoEl.addEventListener('timeupdate', () => {
      const curr = videoEl.currentTime;
      const dur = videoEl.duration || 0;
      
      document.getElementById('audio-current-time').innerText = formatTime(curr);
      document.getElementById('audio-duration').innerText = formatTime(dur);
      document.getElementById('audio-seek').max = dur;
      document.getElementById('audio-seek').value = curr;

      document.getElementById('video-current-time').innerText = formatTime(curr);
      document.getElementById('video-duration').innerText = formatTime(dur);
      document.getElementById('video-seek').max = dur;
      document.getElementById('video-seek').value = curr;
    });

    videoEl.addEventListener('ended', nextTrack);

    // Eventos de Seek
    document.getElementById('audio-seek').addEventListener('input', (e) => videoEl.currentTime = e.target.value);
    document.getElementById('video-seek').addEventListener('input', (e) => videoEl.currentTime = e.target.value);

    // ================= GERENCIAMENTO DE INTERFACE =================
    const updatePlayPauseIcons = () => {
      const iconName = isPlaying ? 'pause' : 'play';
      const btnHTML = `<i data-lucide="${iconName}" fill="currentColor" ${!isPlaying ? 'style="margin-left:3px;"' : ''}></i>`;
      
      document.getElementById('mini-play-icon').outerHTML = btnHTML.replace('<i ', '<i id="mini-play-icon" ');
      document.getElementById('audio-play-icon').outerHTML = btnHTML.replace('<i ', '<i id="audio-play-icon" style="width:28px; height:28px;" ');
      document.getElementById('video-play-icon').outerHTML = btnHTML.replace('<i ', '<i id="video-play-icon" style="width:24px; height:24px;" ');
      updateIcons();
    };

    const updatePlayerUI = () => {
      const media = mediaList[currentIndex];
      if (!media) return;

      miniPlayer.classList.remove('hidden');
      
      // Estilos base de capa
      const bgStyle = media.cover ? `url(${media.cover})` : (media.type === 'audio' ? getGradient(media.name) : 'none');
      const fallbackIcon = !media.cover ? (media.type === 'video' ? '<i data-lucide="monitor-play" style="color:var(--primary); width:24px; height:24px;"></i>' : '<i data-lucide="music" style="color:white; width:24px; height:24px;"></i>') : '';
      
      // Update Mini Player
      document.getElementById('mini-title').innerText = media.name;
      const miniCover = document.getElementById('mini-cover');
      miniCover.style.backgroundImage = media.cover ? bgStyle : 'none';
      miniCover.style.background = !media.cover ? bgStyle : '';
      miniCover.innerHTML = fallbackIcon;

      // Update Audio View
      document.getElementById('audio-title').innerText = media.name;
      const audioCover = document.getElementById('audio-big-cover');
      audioCover.style.backgroundImage = media.cover ? bgStyle : 'none';
      audioCover.innerHTML = !media.cover ? '<i data-lucide="music" style="width:100px; height:100px; color:rgba(255,255,255,0.1)"></i>' : '';

      // Update Video View
      document.getElementById('video-title').innerText = media.name;
      const videoThumb = document.getElementById('video-thumb');
      videoThumb.style.backgroundImage = media.cover ? bgStyle : 'none';
      videoThumb.innerHTML = !media.cover ? '<i data-lucide="monitor-play" style="width:40px; height:40px; color:rgba(0,0,0,0.3)"></i>' : '';

      updatePlayPauseIcons();
      updateIcons();
    };

    const showListView = () => {
      viewMode = 'list';
      document.getElementById('view-list').classList.remove('hidden');
      document.getElementById('view-audio').classList.add('hidden');
      document.getElementById('view-video').classList.add('hidden');
      videoEl.classList.remove('show');
    };

    const openPlayerView = () => {
      const media = mediaList[currentIndex];
      if (!media) return;
      
      updatePlayerUI();
      document.getElementById('view-list').classList.add('hidden');

      if (media.type === 'audio') {
        viewMode = 'audio';
        document.getElementById('view-audio').classList.remove('hidden');
        document.getElementById('view-video').classList.add('hidden');
        videoEl.classList.remove('show'); // Esconde o video se for áudio
      } else {
        viewMode = 'video';
        document.getElementById('view-video').classList.remove('hidden');
        document.getElementById('view-audio').classList.add('hidden');
        videoEl.classList.add('show'); // Mostra o vídeo no fundo
      }
    };

  </script>
</body>
</html>
